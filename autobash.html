<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBash - 一键部署脚本生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 to-purple-200 min-h-screen p-8 text-gray-800">
    <div class="max-w-4xl mx-auto glass rounded-2xl shadow-xl p-8">
        <h1 class="text-3xl font-bold text-center text-indigo-700 mb-8">AutoBash - 一键部署脚本生成器</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- 输入区 -->
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">程序名称（所有文件/目录/服务都以此命名）</label>
                    <input type="text" id="progName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="例如: autobash" value="autobash">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">程序下载地址（仅 URL）</label>
                    <input type="text" id="progUrl" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="例如: https://example.com/release/goway-linux-amd64.tar.gz">
                    <p class="text-xs text-gray-500 mt-1">下载后会自动重命名为程序名称</p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">运行参数（命令行参数）</label>
                    <textarea id="progArgs" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none h-20 text-sm font-mono" placeholder="默认 = 安装路径/程序名称，可追加参数">/usr/local/autobash/autobash</textarea>
                    <p class="text-xs text-gray-500 mt-1">默认值 = 安装基础路径 + 程序名称，修改时自动更新</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">安装基础路径</label>
                    <input type="text" id="basePath" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="默认: /usr/local/程序名称" value="/usr/local/autobash">
                </div>

                <div class="bg-indigo-50 border border-indigo-200 rounded-lg p-3 space-y-1">
                    <p class="text-xs font-bold text-indigo-700 mb-2">📋 自动生成预览</p>
                    <p class="text-xs text-gray-600">安装目录: <span id="pathPreview" class="font-mono text-indigo-600">/usr/local/autobash</span></p>
                    <p class="text-xs text-gray-600">程序路径: <span id="binPreview" class="font-mono text-indigo-600">/usr/local/autobash/autobash</span></p>
                    <p class="text-xs text-gray-600">运行命令: <span id="cmdPreview" class="font-mono text-indigo-600 break-all">/usr/local/autobash/autobash</span></p>
                </div>
                
                <div class="pt-4 flex gap-4">
                    <button id="downloadBtn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md transition-colors duration-200">
                        ⬇ 下载 .sh 文件
                    </button>
                    <button id="copyBtn2" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md transition-colors duration-200">
                        📋 复制脚本内容
                    </button>
                </div>
                <p class="text-xs text-gray-500 text-center mt-2">✨ 右侧脚本预览会随输入实时更新</p>
            </div>

            <!-- 输出区 -->
            <div class="relative bg-gray-900 rounded-lg shadow-inner flex flex-col h-full">
                <div class="flex justify-between items-center bg-gray-800 text-gray-400 px-4 py-2 rounded-t-lg text-sm border-b border-gray-700">
                    <span>生成的脚本预览 (Bash)</span>
                    <button id="copyBtn" class="hover:text-white transition-colors">复制</button>
                </div>
                <div class="p-4 flex-1 overflow-auto">
                    <textarea id="outputScript" class="w-full h-full min-h-[500px] bg-transparent text-green-400 font-mono text-sm resize-none focus:outline-none" readonly># 请在左侧填写信息</textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        var nameInput = document.getElementById('progName');
        var urlInput = document.getElementById('progUrl');
        var argsInput = document.getElementById('progArgs');
        var basePathInput = document.getElementById('basePath');
        var pathPreview = document.getElementById('pathPreview');
        var binPreview = document.getElementById('binPreview');
        var cmdPreview = document.getElementById('cmdPreview');
        var outputScript = document.getElementById('outputScript');
        var generateBtn = null;
        var copyBtn = document.getElementById('copyBtn');
        var copyBtn2 = document.getElementById('copyBtn2');
        var downloadBtn = document.getElementById('downloadBtn');

        // 记录上次自动生成的默认值，用于判断用户是否手动修改过
        var lastAutoArgs = '/usr/local/autobash/autobash';
        var lastAutoBasePath = '/usr/local/autobash';

        function getDefaultArgs() {
            var name = nameInput.value.trim() || 'myapp';
            var base = basePathInput.value.trim() || '/usr/local/' + name;
            return base + '/' + name;
        }

        function getDefaultBasePath() {
            var name = nameInput.value.trim() || 'myapp';
            return '/usr/local/' + name;
        }

        function updatePreview() {
            var name = nameInput.value.trim() || 'myapp';

            // 如果用户没手动改过安装路径，就自动同步
            var currentBase = basePathInput.value.trim();
            if (currentBase === '' || currentBase === lastAutoBasePath) {
                var newBase = getDefaultBasePath();
                basePathInput.value = newBase;
                lastAutoBasePath = newBase;
            }

            var dir = basePathInput.value.trim();
            var bin = dir + '/' + name;

            // 如果用户没手动改过运行参数，就自动同步
            var currentArgs = argsInput.value.trim();
            if (currentArgs === '' || currentArgs === lastAutoArgs) {
                var newDefault = getDefaultArgs();
                argsInput.value = newDefault;
                lastAutoArgs = newDefault;
            }
            var args = argsInput.value.trim();
            pathPreview.textContent = dir;
            binPreview.textContent = bin;
            cmdPreview.textContent = args || bin;
        }

        nameInput.addEventListener('input', updatePreview);
        basePathInput.addEventListener('input', updatePreview);
        argsInput.addEventListener('input', function() {
            // 用户手动编辑了参数，更新预览但不再自动覆盖
            var name = nameInput.value.trim() || 'myapp';
            var dir = basePathInput.value.trim() || '/usr/local/' + name;
            var bin = dir + '/' + name;
            var args = argsInput.value.trim();
            pathPreview.textContent = dir;
            binPreview.textContent = bin;
            cmdPreview.textContent = args || bin;
        });

        function generateScript() {
            var name = nameInput.value.trim() || 'myapp';
            var url = urlInput.value.trim().replace(/[\n\r\s]+/g, '');
            var args = argsInput.value.trim();
            var basePath = basePathInput.value.trim() || '/usr/local/' + name;

            var L = [];
            L.push('#!/bin/bash');
            L.push('# =======================================================');
            L.push('# ' + name + ' 一键部署与管理脚本 (AutoBash 生成)');
            L.push('# =======================================================');
            L.push('');
            L.push('# ---- 用户自定义配置 ----');
            L.push('NAME="' + name + '"');
            L.push("DOWNLOAD_URL='" + url + "'");
            L.push('ARGS="' + args + '"');
            L.push('');
            L.push('# ---- 自动生成的路径（全部以程序名称命名）----');
            L.push('INSTALL_DIR="' + basePath + '"');
            L.push('BIN_PATH="${INSTALL_DIR}/${NAME}"');
            L.push('SERVICE_NAME="${NAME}"');
            L.push('SERVICE_FILE="/etc/systemd/system/${SERVICE_NAME}.service"');
            L.push('');
            L.push('# ---- 颜色定义 ----');
            L.push('RED="\\033[31m"');
            L.push('GREEN="\\033[32m"');
            L.push('YELLOW="\\033[33m"');
            L.push('BLUE="\\033[36m"');
            L.push('PLAIN="\\033[0m"');
            L.push('');
            L.push('# ---- 辅助函数 ----');
            L.push('check_root() {');
            L.push('    if [ "$(id -u)" -ne 0 ]; then');
            L.push('        echo -e "${RED}错误: 请使用 root 权限运行此脚本！${PLAIN}"');
            L.push('        exit 1');
            L.push('    fi');
            L.push('}');
            L.push('');
            L.push('check_installed() {');
            L.push('    if [ -f "${BIN_PATH}" ]; then');
            L.push('        return 0');
            L.push('    else');
            L.push('        return 1');
            L.push('    fi');
            L.push('}');
            L.push('');
            L.push('show_status() {');
            L.push('    if check_installed; then');
            L.push('        echo -e "  安装状态: ${GREEN}已安装${PLAIN}"');
            L.push('        echo -e "  安装目录: ${GREEN}${INSTALL_DIR}${PLAIN}"');
            L.push('        if systemctl is-active --quiet ${SERVICE_NAME}.service 2>/dev/null; then');
            L.push('            echo -e "  运行状态: ${GREEN}运行中${PLAIN}"');
            L.push('        else');
            L.push('            echo -e "  运行状态: ${RED}未运行${PLAIN}"');
            L.push('        fi');
            L.push('    else');
            L.push('        echo -e "  安装状态: ${RED}未安装${PLAIN}"');
            L.push('    fi');
            L.push('}');
            L.push('');
            L.push('# ---- 安装 ----');
            L.push('do_install() {');
            L.push('    check_root');
            L.push('    if check_installed; then');
            L.push('        echo -e "${YELLOW}${NAME} 已经安装过了，如需重新安装请先卸载。${PLAIN}"');
            L.push('        return');
            L.push('    fi');
            L.push('    echo -e "${GREEN}=========================================${PLAIN}"');
            L.push('    echo -e "${GREEN} 开始安装 ${NAME}${PLAIN}"');
            L.push('    echo -e "${GREEN}=========================================${PLAIN}"');
            L.push('');
            L.push('    mkdir -p "${INSTALL_DIR}"');
            L.push('');
            L.push('    echo -e "${BLUE}[1/4]${PLAIN} 正在下载程序..."');
            L.push('    wget --no-check-certificate -q --show-progress -O "${BIN_PATH}" "${DOWNLOAD_URL}"');
            L.push('    if [ $? -ne 0 ]; then');
            L.push('        echo -e "${RED}下载失败！尝试使用 curl 下载...${PLAIN}"');
            L.push('        curl -kL -o "${BIN_PATH}" "${DOWNLOAD_URL}"');
            L.push('        if [ $? -ne 0 ]; then');
            L.push('            echo -e "${RED}下载失败，请检查URL或网络连接！${PLAIN}"');
            L.push('            rm -rf "${INSTALL_DIR}"');
            L.push('            exit 1');
            L.push('        fi');
            L.push('    fi');
            L.push('');
            L.push('    echo -e "${BLUE}[2/4]${PLAIN} 赋予执行权限..."');
            L.push('    chmod +x "${BIN_PATH}"');
            L.push('');
            L.push('    echo -e "${BLUE}[3/4]${PLAIN} 配置 systemd 自启动服务..."');
            L.push('    cat > "${SERVICE_FILE}" << SVCEOF');
            L.push('[Unit]');
            L.push('Description=${NAME} Service');
            L.push('After=network.target');
            L.push('');
            L.push('[Service]');
            L.push('Type=simple');
            L.push('WorkingDirectory=${INSTALL_DIR}');
            L.push('ExecStart=${ARGS}');
            L.push('Restart=always');
            L.push('RestartSec=5');
            L.push('User=root');
            L.push('');
            L.push('[Install]');
            L.push('WantedBy=multi-user.target');
            L.push('SVCEOF');
            L.push('');
            L.push('    echo -e "${BLUE}[4/4]${PLAIN} 启动服务..."');
            L.push('    systemctl daemon-reload');
            L.push('    systemctl enable ${SERVICE_NAME}.service');
            L.push('    systemctl start ${SERVICE_NAME}.service');
            L.push('');
            L.push('    echo ""');
            L.push('    echo -e "${GREEN}=========================================${PLAIN}"');
            L.push('    echo -e "${GREEN} ${NAME} 安装完成并已启动！${PLAIN}"');
            L.push('    echo -e "${GREEN}=========================================${PLAIN}"');
            L.push('}');
            L.push('');
            L.push('# ---- 启动 ----');
            L.push('do_start() {');
            L.push('    check_root');
            L.push('    systemctl start ${SERVICE_NAME}.service');
            L.push('    echo -e "${GREEN}${NAME} 已启动。${PLAIN}"');
            L.push('}');
            L.push('');
            L.push('# ---- 停止 ----');
            L.push('do_stop() {');
            L.push('    check_root');
            L.push('    systemctl stop ${SERVICE_NAME}.service');
            L.push('    echo -e "${YELLOW}${NAME} 已停止。${PLAIN}"');
            L.push('}');
            L.push('');
            L.push('# ---- 重启 ----');
            L.push('do_restart() {');
            L.push('    check_root');
            L.push('    systemctl restart ${SERVICE_NAME}.service');
            L.push('    echo -e "${GREEN}${NAME} 已重启。${PLAIN}"');
            L.push('}');
            L.push('');
            L.push('# ---- 卸载 ----');
            L.push('do_uninstall() {');
            L.push('    check_root');
            L.push('    echo -e "${YELLOW}正在卸载 ${NAME}...${PLAIN}"');
            L.push('    systemctl stop ${SERVICE_NAME}.service 2>/dev/null');
            L.push('    systemctl disable ${SERVICE_NAME}.service 2>/dev/null');
            L.push('    rm -f "${SERVICE_FILE}"');
            L.push('    systemctl daemon-reload');
            L.push('    rm -rf "${INSTALL_DIR}"');
            L.push('    echo -e "${GREEN}${NAME} 已完全卸载。${PLAIN}"');
            L.push('}');
            L.push('');
            L.push('# ---- 查看日志 ----');
            L.push('do_log() {');
            L.push('    journalctl -u ${SERVICE_NAME}.service -f');
            L.push('}');
            L.push('');
            L.push('# ---- 交互式菜单 ----');
            L.push('show_menu() {');
            L.push('    clear');
            L.push('    echo -e "');
            L.push('  ${GREEN}=========================================${PLAIN}');
            L.push('  ${GREEN}       ' + name + ' 管理脚本${PLAIN}');
            L.push('  ${GREEN}       powered by AutoBash${PLAIN}');
            L.push('  ${GREEN}=========================================${PLAIN}');
            L.push('"');
            L.push('    show_status');
            L.push('    echo ""');
            L.push('    echo -e "  ${GREEN}1.${PLAIN} 安装 ${NAME}"');
            L.push('    echo -e "  ${GREEN}2.${PLAIN} 启动 ${NAME}"');
            L.push('    echo -e "  ${GREEN}3.${PLAIN} 停止 ${NAME}"');
            L.push('    echo -e "  ${GREEN}4.${PLAIN} 重启 ${NAME}"');
            L.push('    echo -e "  ${GREEN}5.${PLAIN} 卸载 ${NAME}"');
            L.push('    echo -e "  ${GREEN}6.${PLAIN} 查看状态"');
            L.push('    echo -e "  ${GREEN}7.${PLAIN} 查看日志"');
            L.push('    echo -e "  ${GREEN}0.${PLAIN} 退出脚本"');
            L.push('    echo ""');
            L.push('    echo -e "  ${GREEN}=========================================${PLAIN}"');
            L.push('    read -rp "  请输入选项 [0-7]: " num');
            L.push('    case "$num" in');
            L.push('        1) do_install ;;');
            L.push('        2) do_start ;;');
            L.push('        3) do_stop ;;');
            L.push('        4) do_restart ;;');
            L.push('        5) do_uninstall ;;');
            L.push('        6) systemctl status ${SERVICE_NAME}.service ;;');
            L.push('        7) do_log ;;');
            L.push('        0) exit 0 ;;');
            L.push('        *) echo -e "${RED}无效选项！${PLAIN}" ;;');
            L.push('    esac');
            L.push('    echo ""');
            L.push('    read -rp "  按回车键返回菜单..." ');
            L.push('    show_menu');
            L.push('}');
            L.push('');
            L.push('# ---- 入口：支持参数模式和菜单模式 ----');
            L.push('check_root');
            L.push('if [ $# -eq 0 ]; then');
            L.push('    show_menu');
            L.push('else');
            L.push('    case "$1" in');
            L.push('        install)   do_install ;;');
            L.push('        start)     do_start ;;');
            L.push('        stop)      do_stop ;;');
            L.push('        restart)   do_restart ;;');
            L.push('        uninstall) do_uninstall ;;');
            L.push('        status)    systemctl status ${SERVICE_NAME}.service ;;');
            L.push('        log)       do_log ;;');
            L.push('        *) echo -e "${RED}未知命令: $1${PLAIN}"; echo "用法: $0 {install|start|stop|restart|uninstall|status|log}" ;;');
            L.push('    esac');
            L.push('fi');

            outputScript.value = L.join('\n');
        }

        // 实时预览
        [nameInput, urlInput, argsInput, basePathInput].forEach(function(el) {
            el.addEventListener('input', generateScript);
        });

        // 初始化
        updatePreview();
        generateScript();

        // 复制功能（顶部小按钮）
        copyBtn.addEventListener('click', function() {
            outputScript.select();
            document.execCommand('copy');
            var originalText = copyBtn.innerText;
            copyBtn.innerText = '已复制!';
            copyBtn.classList.add('text-green-400');
            setTimeout(function() {
                copyBtn.innerText = originalText;
                copyBtn.classList.remove('text-green-400');
            }, 2000);
        });

        // 复制功能（左侧大按钮）
        copyBtn2.addEventListener('click', function() {
            outputScript.select();
            document.execCommand('copy');
            var originalText = copyBtn2.innerText;
            copyBtn2.innerText = '✅ 已复制!';
            setTimeout(function() {
                copyBtn2.innerText = originalText;
            }, 2000);
        });

        // 下载功能
        downloadBtn.addEventListener('click', function() {
            var blob = new Blob([outputScript.value], { type: 'text/x-sh' });
            var dlUrl = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = dlUrl;
            a.download = (nameInput.value.trim() || 'gogogo') + '.sh';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(dlUrl);
        });
    </script>
</body>
</html>
